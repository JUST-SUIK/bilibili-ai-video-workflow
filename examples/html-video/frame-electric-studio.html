<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Electric Studio · 沉浸式动态展示</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #0a0a0a;
    font-family: 'Manrope', sans-serif;
    cursor: none;
  }

  /* 粒子画布 */
  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  /* 主容器 */
  .scene {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    z-index: 1;
  }

  /* 上下面板 */
  .panel-top {
    flex: 1;
    background: #ffffff;
    position: relative;
    overflow: hidden;
    animation: panelDown 2s cubic-bezier(0.16,1,0.3,1) forwards;
    transform: translateY(-100%);
  }

  .panel-bot {
    flex: 1;
    background: #4361ee;
    position: relative;
    overflow: hidden;
    animation: panelUp 2s cubic-bezier(0.16,1,0.3,1) forwards;
    transform: translateY(100%);
  }

  @keyframes panelDown {
    to { transform: translateY(0); }
  }

  @keyframes panelUp {
    to { transform: translateY(0); }
  }

  /* 面板内的流动光效 */
  .panel-top::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at center, rgba(67,97,238,0.1) 0%, transparent 70%);
    animation: floatLight 8s ease-in-out infinite;
  }

  .panel-bot::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.15) 0%, transparent 70%);
    animation: floatLight 8s ease-in-out infinite reverse;
  }

  @keyframes floatLight {
    0%, 100% { transform: translate(-20%, -20%) rotate(0deg); }
    25% { transform: translate(20%, -10%) rotate(5deg); }
    50% { transform: translate(-10%, 20%) rotate(-3deg); }
    75% { transform: translate(15%, 15%) rotate(2deg); }
  }

  /* 中线强调条 */
  .seam {
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 8px;
    background: #0a0a0a;
    z-index: 10;
    transform: translateX(-50%) scaleY(0);
    animation: seamGrow 1.5s cubic-bezier(0.16,1,0.3,1) 1.5s forwards;
    transform-origin: top;
  }

  @keyframes seamGrow {
    to { transform: translateX(-50%) scaleY(1); }
  }

  /* 引言容器 */
  .quote-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 20;
    width: 80%;
  }

  /* 引言文字 */
  .quote-line {
    font-size: clamp(48px, 8vw, 120px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -2px;
    opacity: 0;
    transform: translateY(40px);
    animation: lineReveal 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .quote-line:nth-child(1) {
    color: #0a0a0a;
    animation-delay: 2s;
  }

  .quote-line:nth-child(2) {
    color: #0a0a0a;
    animation-delay: 2.3s;
  }

  .quote-line:nth-child(3) {
    color: #ffffff;
    animation-delay: 2.6s;
  }

  @keyframes lineReveal {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* 文字呼吸效果 */
  .quote-line.revealed {
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; }
  }

  /* 署名 */
  .attribution {
    position: absolute;
    bottom: 15%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    opacity: 0;
    animation: fadeIn 1s ease-out 3.5s forwards;
  }

  .attr-name {
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 1px;
  }

  .attr-role {
    font-size: 16px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* 品牌标记 */
  .brand-mark {
    position: absolute;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 4px;
    text-transform: uppercase;
    z-index: 20;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 4s forwards;
  }

  .brand-top {
    top: 40px;
    right: 40px;
    color: #0a0a0a;
  }

  .brand-bottom {
    bottom: 40px;
    right: 40px;
    color: rgba(255,255,255,0.6);
    animation-delay: 4.2s;
  }

  /* 浮动文字装饰 */
  .floating-text {
    position: absolute;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    animation: floatText 12s linear infinite;
    z-index: 15;
  }

  .ft-1 { top: 20%; left: 10%; color: rgba(10,10,10,0.3); animation-delay: 4.5s; }
  .ft-2 { top: 70%; right: 15%; color: rgba(255,255,255,0.3); animation-delay: 5s; }
  .ft-3 { bottom: 30%; left: 20%; color: rgba(10,10,10,0.2); animation-delay: 5.5s; }

  @keyframes floatText {
    0% { opacity: 0; transform: translateX(-20px); }
    10% { opacity: 0.3; }
    90% { opacity: 0.3; }
    100% { opacity: 0; transform: translateX(20px); }
  }

  /* 循环动画 - 整体场景 */
  .scene.loop {
    animation: sceneLoop 16s ease-in-out infinite;
  }

  @keyframes sceneLoop {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.05); }
  }

  /* 鼠标跟随光效 */
  .cursor-glow {
    position: fixed;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(67,97,238,0.2) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    transition: opacity 0.3s;
  }

  /* 扫描线效果 */
  .scanline {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 50;
  }

  @media (prefers-reduced-motion: reduce) {
    * {
      animation: none !important;
    }
    .panel-top, .panel-bot {
      transform: none;
    }
    .seam {
      transform: translateX(-50%) scaleY(1);
    }
    .quote-line, .attribution, .brand-mark, .floating-text {
      opacity: 1;
      transform: none;
    }
  }
</style>
</head>
<body>
  <!-- 粒子背景 -->
  <canvas id="particles"></canvas>

  <!-- 鼠标光效 -->
  <div class="cursor-glow" id="cursorGlow"></div>

  <!-- 扫描线 -->
  <div class="scanline"></div>

  <!-- 主场景 -->
  <div class="scene loop">
    <!-- 上下面板 -->
    <div class="panel-top"></div>
    <div class="panel-bot"></div>

    <!-- 中线强调条 -->
    <div class="seam"></div>

    <!-- 引言 -->
    <div class="quote-container">
      <div class="quote-line">The future belongs</div>
      <div class="quote-line">to those who believe</div>
      <div class="quote-line">in the beauty of their dreams.</div>
    </div>

    <!-- 署名 -->
    <div class="attribution">
      <div class="attr-name">Eleanor Roosevelt</div>
      <div class="attr-role">Former First Lady of the United States</div>
    </div>

    <!-- 品牌标记 -->
    <div class="brand-mark brand-top">EXAMPLE</div>
    <div class="brand-mark brand-bottom">Electric Studio</div>

    <!-- 浮动文字 -->
    <div class="floating-text ft-1">Dream · Believe · Achieve</div>
    <div class="floating-text ft-2">The Future Is Now</div>
    <div class="floating-text ft-3">Inspiration · Vision · Legacy</div>
  </div>

  <script>
    // 粒子系统
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouseX = 0;
    let mouseY = 0;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.opacity = Math.random() * 0.5 + 0.1;
        this.life = Math.random() * 200 + 100;
        this.maxLife = this.life;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life--;

        // 鼠标吸引效果
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          this.x += dx * 0.01;
          this.y += dy * 0.01;
        }

        if (this.life <= 0 || this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
          this.reset();
        }
      }

      draw() {
        const alpha = (this.life / this.maxLife) * this.opacity;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(67, 97, 238, ${alpha})`;
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < 80; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    // 鼠标跟随
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      const glow = document.getElementById('cursorGlow');
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });

    // 引言动画完成后添加呼吸效果
    document.querySelectorAll('.quote-line').forEach(line => {
      line.addEventListener('animationend', () => {
        line.classList.add('revealed');
      });
    });

    // 初始化
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    initParticles();
    animateParticles();
  </script>
</body>
</html>
