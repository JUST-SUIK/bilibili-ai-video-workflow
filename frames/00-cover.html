<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用AI 10分钟写完一周周报</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            background: #F8FAFC;
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .cover-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* 渐变装饰线条 */
        .gradient-line {
            position: absolute;
            top: 50%;
            right: 10%;
            width: 300px;
            height: 4px;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            transform: translateY(-50%) rotate(45deg);
            opacity: 0;
            animation: fadeInLine 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.5s forwards;
        }

        @keyframes fadeInLine {
            from {
                opacity: 0;
                transform: translateY(-50%) rotate(45deg) scaleX(0);
            }
            to {
                opacity: 0.6;
                transform: translateY(-50%) rotate(45deg) scaleX(1);
            }
        }

        /* 几何网格装饰 */
        .grid-decoration {
            position: absolute;
            bottom: 5%;
            left: 0;
            width: 100%;
            height: 120px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 48px,
                #E2E8F0 48px,
                #E2E8F0 49px
            );
            opacity: 0;
            animation: fadeInGrid 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.8s forwards;
        }

        @keyframes fadeInGrid {
            from { opacity: 0; }
            to { opacity: 0.3; }
        }

        /* 主标题 */
        .main-title {
            font-size: 72px;
            font-weight: 700;
            color: #1E293B;
            line-height: 1.2;
            text-align: center;
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeInUpTitle 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s forwards;
        }

        @keyframes fadeInUpTitle {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-title .highlight {
            color: #F59E0B;
        }

        /* 副标题 */
        .subtitle {
            font-size: 24px;
            font-weight: 400;
            color: #64748B;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInUpSubtitle 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.6s forwards;
        }

        @keyframes fadeInUpSubtitle {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* AI图标 */
        .ai-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeInIcon 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.1s forwards,
                       pulseIcon 2s ease-in-out 1s infinite;
        }

        @keyframes fadeInIcon {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulseIcon {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
            }
        }

        .ai-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        /* 像素螃蟹 */
        .pixel-crab {
            position: absolute;
            bottom: 80px;
            right: 120px;
            opacity: 0;
            animation: fadeInCrab 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1s forwards,
                       floatCrab 3s ease-in-out 1.5s infinite;
        }

        @keyframes fadeInCrab {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatCrab {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* 品牌标识 */
        .brand-mark {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #94A3B8;
            opacity: 0;
            animation: fadeInBrand 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1.2s forwards;
        }

        @keyframes fadeInBrand {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 48px;
            }
            .subtitle {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="cover-container">
        <!-- 背景装饰 -->
        <div class="bg-decoration">
            <div class="gradient-line"></div>
            <div class="grid-decoration"></div>
        </div>

        <!-- AI图标 -->
        <div class="ai-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
        </div>

        <!-- 主标题 -->
        <h1 class="main-title">
            用AI <span class="highlight">10分钟</span>写完一周周报
        </h1>

        <!-- 副标题 -->
        <p class="subtitle">
            附Prompt模板 | 效率提升10倍
        </p>

        <!-- 像素螃蟹 -->
        <div class="pixel-crab">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- 螃蟹身体 -->
                <rect x="16" y="24" width="32" height="24" rx="4" fill="#F59E0B"/>
                <!-- 螃蟹眼睛 -->
                <rect x="24" y="28" width="4" height="4" rx="2" fill="#1E293B"/>
                <rect x="36" y="28" width="4" height="4" rx="2" fill="#1E293B"/>
                <!-- 螃蟹钳子 -->
                <rect x="8" y="20" width="12" height="8" rx="4" fill="#F59E0B"/>
                <rect x="44" y="20" width="12" height="8" rx="4" fill="#F59E0B"/>
                <!-- 螃蟹腿 -->
                <rect x="20" y="48" width="4" height="8" rx="2" fill="#F59E0B"/>
                <rect x="28" y="48" width="4" height="8" rx="2" fill="#F59E0B"/>
                <rect x="36" y="48" width="4" height="8" rx="2" fill="#F59E0B"/>
                <rect x="44" y="48" width="4" height="8" rx="2" fill="#F59E0B"/>
            </svg>
        </div>

        <!-- 品牌标识 -->
        <div class="brand-mark">AI学习之路 · 2026</div>
    </div>
</body>
</html>
