<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Frame 01 - 钩子：反直觉开场</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Geist';
    src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-Bold.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
  }
  @font-face {
    font-family: 'Geist';
    src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-Black.woff2') format('woff2');
    font-weight: 900;
    font-display: swap;
  }
</style>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: #0a0a0a;
    overflow: hidden;
    font-family: 'Geist', 'Noto Sans SC', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  /* 暗角效果 */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 5;
  }

  /* 顶部标签 */
  .caption {
    position: absolute;
    top: 48px;
    left: 80px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    opacity: 0;
    animation: fadeIn 0.8s cubic-bezier(0.32, 0.72, 0, 1) 0.3s forwards;
  }

  /* 第一行：反直觉的事实 */
  .line-intro {
    font-size: 28px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.05em;
    margin-bottom: 40px;
    min-height: 42px;
    opacity: 0;
    animation: fadeIn 0.8s cubic-bezier(0.32, 0.72, 0, 1) 0.5s forwards;
    position: relative;
    z-index: 2;
  }

  /* 主文字容器 */
  .main-text {
    font-size: 96px;
    font-weight: 900;
    color: #f5f5f7;
    letter-spacing: 0.03em;
    position: relative;
    z-index: 2;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0 8px;
    max-width: 1600px;
    text-align: center;
    line-height: 1.5;
    min-height: 150px;
  }

  /* 每个字符 */
  .char {
    opacity: 0;
    display: inline-block;
    position: relative;
  }

  .char.revealing {
    animation: charReveal 0.4s cubic-bezier(0.32, 0.72, 0, 1) forwards;
  }

  .char.revealed {
    opacity: 1;
  }

  /* chromatic ghost 效果 */
  @keyframes charReveal {
    0% {
      opacity: 0;
      transform: translateY(8px);
      text-shadow: 3px 0 #ff6b3a, -3px 0 #4361ee;
    }
    30% {
      opacity: 1;
      transform: translateY(0);
      text-shadow: 3px 0 #ff6b3a, -3px 0 #4361ee;
    }
    100% {
      opacity: 1;
      transform: translateY(0);
      text-shadow: none;
    }
  }

  /* 强调词 */
  .char.accent {
    color: #ff6b3a;
  }

  /* 光标 */
  .cursor {
    display: inline-block;
    width: 4px;
    height: 80px;
    background: #4361ee;
    margin-left: 8px;
    align-self: center;
    opacity: 0;
    animation: cursorAppear 0.3s cubic-bezier(0.32, 0.72, 0, 1) 6.5s forwards, cursorBlink 1s cubic-bezier(0.45, 0.05, 0.55, 0.95) 6.8s infinite;
    position: relative;
  }

  /* 光标拖尾光晕 */
  .cursor::after {
    content: '';
    position: absolute;
    top: -20px;
    left: -60px;
    width: 120px;
    height: 120px;
    background: radial-gradient(ellipse at center, rgba(67,97,238,0.3) 0%, transparent 70%);
    pointer-events: none;
    filter: blur(8px);
  }

  @keyframes cursorAppear {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes cursorBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* 数字爆炸区域 */
  .number-section {
    position: absolute;
    bottom: 240px;
    display: flex;
    align-items: center;
    gap: 60px;
    z-index: 3;
  }

  .number-from {
    font-family: 'JetBrains Mono', monospace;
    font-size: 72px;
    font-weight: 700;
    color: rgba(255,255,255,0.2);
    text-decoration: line-through;
    text-decoration-color: #ff6b3a;
    text-decoration-thickness: 3px;
    min-height: 72px;
    opacity: 0;
    animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 7.5s forwards;
  }

  .number-arrow {
    font-size: 48px;
    color: #ff6b3a;
    opacity: 0;
    animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) 8.2s forwards, pulseGlow 1.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) 8.6s infinite;
  }

  .number-to {
    font-family: 'JetBrains Mono', monospace;
    font-size: 96px;
    font-weight: 900;
    color: #4361ee;
    min-height: 96px;
    opacity: 0;
    animation: numberExplode 0.7s cubic-bezier(0.16, 1, 0.3, 1) 8.5s forwards;
    text-shadow: 0 0 40px rgba(67,97,238,0.4);
  }

  @keyframes numberExplode {
    0% {
      opacity: 0;
      transform: scale(0.7);
    }
    70% {
      opacity: 1;
      transform: scale(1.05);
    }
    100% {
      opacity: 1;
      transform: scale(1);
    }
  }

  @keyframes pulseGlow {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; text-shadow: 0 0 20px rgba(255,107,58,0.5); }
  }

  /* 底部副标题 */
  .subtitle {
    position: absolute;
    bottom: 120px;
    font-size: 24px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.02em;
    min-height: 36px;
    opacity: 0;
    animation: fadeIn 1s cubic-bezier(0.32, 0.72, 0, 1) 9.5s forwards;
    z-index: 2;
  }

  /* 定向光斑 */
  .flare {
    position: absolute;
    width: 2px;
    height: 200px;
    background: linear-gradient(180deg, transparent, rgba(67,97,238,0.15), transparent);
    transform: rotate(-30deg);
    opacity: 0;
    pointer-events: none;
    z-index: 1;
  }
  .flare:nth-child(1) { top: 200px; left: 500px; animation: flareIn 0.8s cubic-bezier(0.32, 0.72, 0, 1) 2s forwards; }
  .flare:nth-child(2) { top: 150px; left: 900px; animation: flareIn 0.8s cubic-bezier(0.32, 0.72, 0, 1) 2.5s forwards; transform: rotate(20deg); }
  .flare:nth-child(3) { top: 300px; left: 1300px; animation: flareIn 0.8s cubic-bezier(0.32, 0.72, 0, 1) 3s forwards; transform: rotate(-15deg); }
  .flare:nth-child(4) { top: 500px; left: 700px; animation: flareIn 0.8s cubic-bezier(0.32, 0.72, 0, 1) 3.5s forwards; transform: rotate(10deg); background: linear-gradient(180deg, transparent, rgba(255,107,58,0.1), transparent); }

  @keyframes flareIn {
    0% { opacity: 0; }
    50% { opacity: 0.6; }
    100% { opacity: 0.3; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* 闪烁扫光 */
  .shimmer {
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 45%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 55%, transparent 100%);
    pointer-events: none;
    z-index: 6;
    animation: shimmerSweep 2s cubic-bezier(0.32, 0.72, 0, 1) 6.2s forwards;
  }

  @keyframes shimmerSweep {
    from { left: -100%; }
    to { left: 100%; }
  }

  /* 底部元数据 */
  .meta {
    position: absolute;
    bottom: 48px;
    right: 80px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    opacity: 0;
    animation: fadeIn 0.8s cubic-bezier(0.32, 0.72, 0, 1) 10s forwards;
  }

  /* prefers-reduced-motion */
  @media (prefers-reduced-motion: reduce) {
    .char { opacity: 1 !important; animation: none !important; }
    .cursor { opacity: 1 !important; animation: none !important; }
    .caption, .subtitle, .meta, .line-intro { opacity: 1 !important; animation: none !important; }
    .flare { opacity: 0.3 !important; animation: none !important; }
    .shimmer { display: none !important; }
    .number-from, .number-arrow { opacity: 1 !important; animation: none !important; }
    .number-to { opacity: 1 !important; animation: none !important; transform: none !important; filter: none !important; }
  }
</style>
</head>
<body>

  <!-- 光斑 -->
  <div class="flare"></div>
  <div class="flare"></div>
  <div class="flare"></div>
  <div class="flare"></div>

  <!-- 顶部标签 -->
  <div class="caption">FRAME 01 · 用AI写周报</div>

  <!-- 引导文字 -->
  <div class="line-intro">一个反直觉的事实</div>

  <!-- 主文字 -->
  <div class="main-text" id="mainText">
    <span class="char" data-delay="4000">真</span><span class="char" data-delay="4120">正</span><span class="char" data-delay="4240">花</span><span class="char" data-delay="4360">时</span><span class="char" data-delay="4480">间</span><span class="char" data-delay="4600">的</span><span class="char" data-delay="4720">不</span><span class="char" data-delay="4840">是</span><span class="char accent" data-delay="5100">"写"</span><span class="char" data-delay="5360">，</span><span class="char" data-delay="5480">是</span><span class="char accent" data-delay="5740">"想"</span>
    <span class="cursor"></span>
  </div>

  <!-- 扫光 -->
  <div class="shimmer"></div>

  <!-- 数字对比 -->
  <div class="number-section">
    <div class="number-from">2 小时</div>
    <div class="number-arrow">→</div>
    <div class="number-to">10 分钟</div>
  </div>

  <!-- 底部副标题 -->
  <div class="subtitle">AI写周报，不是帮你"写"，是帮你"想"</div>

  <!-- 底部元数据 -->
  <div class="meta">00:00:00</div>

<script>
  // 逐字揭示
  document.querySelectorAll('.char').forEach(char => {
    const delay = parseInt(char.dataset.delay);
    if (!delay) return;
    setTimeout(() => {
      char.classList.add('revealing');
      setTimeout(() => {
        char.classList.remove('revealing');
        char.classList.add('revealed');
      }, 400);
    }, delay);
  });
</script>

</body>
</html>
