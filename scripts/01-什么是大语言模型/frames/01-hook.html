<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Frame 01 - 钩子：它根本没记住</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Inter+Tight:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: #06070a;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  /* 暗角效果 */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
  }

  /* 顶部标签 */
  .caption {
    position: absolute;
    top: 48px;
    left: 80px;
    font-family: 'Inter Tight', monospace;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    opacity: 0;
    animation: fadeIn 0.8s ease 0.3s forwards;
  }

  /* 主文字容器 */
  .main-text {
    font-size: 120px;
    font-weight: 900;
    color: #f5f5f7;
    letter-spacing: 0.05em;
    position: relative;
    z-index: 2;
    display: flex;
  }

  /* 每个字符 */
  .char {
    opacity: 0;
    display: inline-block;
    position: relative;
  }

  /* 字符揭示时的 chromatic 效果 */
  .char.revealing {
    animation: charReveal 0.4s ease forwards;
  }

  .char.revealed {
    opacity: 1;
  }

  /* chromatic ghost - 每个字符出现瞬间的色彩偏移 */
  @keyframes charReveal {
    0% {
      opacity: 0;
      transform: translateY(8px);
      text-shadow: 3px 0 #ff3b6f, -3px 0 #00d4ff;
    }
    30% {
      opacity: 1;
      transform: translateY(0);
      text-shadow: 3px 0 #ff3b6f, -3px 0 #00d4ff;
    }
    100% {
      opacity: 1;
      transform: translateY(0);
      text-shadow: none;
    }
  }

  /* 光标 */
  .cursor {
    display: inline-block;
    width: 4px;
    height: 100px;
    background: #ff3b6f;
    margin-left: 8px;
    align-self: center;
    opacity: 0;
    animation: cursorAppear 0.3s ease 0.8s forwards, cursorBlink 1s ease-in-out 1.1s infinite;
    position: relative;
  }

  /* 光标拖尾光晕 */
  .cursor::after {
    content: '';
    position: absolute;
    top: -20px;
    left: -60px;
    width: 120px;
    height: 140px;
    background: radial-gradient(ellipse at center, rgba(255,59,111,0.25) 0%, transparent 70%);
    pointer-events: none;
    filter: blur(8px);
  }

  @keyframes cursorAppear {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes cursorBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* 副标题 */
  .subtitle {
    position: absolute;
    bottom: 200px;
    font-size: 28px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.02em;
    opacity: 0;
    animation: fadeIn 1s ease 3.5s forwards;
  }

  /* 底部元数据 */
  .meta {
    position: absolute;
    bottom: 48px;
    right: 80px;
    font-family: 'Inter Tight', monospace;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    opacity: 0;
    animation: fadeIn 0.8s ease 4s forwards;
  }

  /* 定向光斑 */
  .flare {
    position: absolute;
    width: 2px;
    height: 200px;
    background: linear-gradient(180deg, transparent, rgba(255,59,111,0.15), transparent);
    transform: rotate(-30deg);
    opacity: 0;
    pointer-events: none;
  }
  .flare:nth-child(1) { top: 300px; left: 600px; animation: flareIn 0.8s ease 1.5s forwards; }
  .flare:nth-child(2) { top: 250px; left: 900px; animation: flareIn 0.8s ease 2s forwards; transform: rotate(20deg); }
  .flare:nth-child(3) { top: 400px; left: 1200px; animation: flareIn 0.8s ease 2.5s forwards; transform: rotate(-15deg); }

  @keyframes flareIn {
    0% { opacity: 0; }
    50% { opacity: 0.6; }
    100% { opacity: 0.3; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* 闪烁扫光 */
  .shimmer {
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 45%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 55%, transparent 100%);
    pointer-events: none;
    z-index: 3;
    animation: shimmerSweep 2s ease 3.2s forwards;
  }

  @keyframes shimmerSweep {
    from { left: -100%; }
    to { left: 100%; }
  }

  /* prefers-reduced-motion */
  @media (prefers-reduced-motion: reduce) {
    .char { opacity: 1 !important; animation: none !important; }
    .cursor { opacity: 1 !important; animation: none !important; }
    .caption, .subtitle, .meta { opacity: 1 !important; animation: none !important; }
    .flare { opacity: 0.3 !important; animation: none !important; }
    .shimmer { display: none !important; }
  }
</style>
</head>
<body>

  <!-- 光斑 -->
  <div class="flare"></div>
  <div class="flare"></div>
  <div class="flare"></div>

  <!-- 顶部标签 -->
  <div class="caption">FRAME 01 · 什么是大语言模型</div>

  <!-- 主文字 -->
  <div class="main-text" id="mainText">
    <span class="char" data-delay="800">它</span>
    <span class="char" data-delay="950">根</span>
    <span class="char" data-delay="1100">本</span>
    <span class="char" data-delay="1250">没</span>
    <span class="char" data-delay="1400">记</span>
    <span class="char" data-delay="1550">住</span>
    <span class="cursor"></span>
  </div>

  <!-- 扫光 -->
  <div class="shimmer"></div>

  <!-- 副标题 -->
  <div class="subtitle">ChatGPT 是怎么"记住"你前面说的话的？</div>

  <!-- 底部元数据 -->
  <div class="meta">00:00:00</div>

<script>
  // 逐字揭示
  document.querySelectorAll('.char').forEach(char => {
    const delay = parseInt(char.dataset.delay);
    setTimeout(() => {
      char.classList.add('revealing');
      setTimeout(() => {
        char.classList.remove('revealing');
        char.classList.add('revealed');
      }, 400);
    }, delay);
  });
</script>

</body>
</html>
